name: update
on:
  schedule:
    # 日本時間の 8:00 / 12:00 / 15:00 に更新(UTC 23:00 / 3:00 / 6:00)
    - cron: "0 23 * * *"
    - cron: "0 3 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: generate
        run: python gen_ohtani.py
      - name: commit
        run: |
          git config user.name "auto-update"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "auto update"
          git push
